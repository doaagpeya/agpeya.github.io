<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 | Doa Agpeya Indonesia</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        
        :root {
            --nyc-navy: #0c2340;
            --nyc-blue: #3b82f6;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #0c2340;
        }

        /* AdSense Box Style for 404 Context */
        .adsense-box-404 {
            background-image: repeating-linear-gradient(45deg, rgba(255,255,255,0.02), rgba(255,255,255,0.02) 10px, transparent 10px, transparent 20px);
            border: 2px dashed rgba(255, 255, 255, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255, 255, 255, 0.3);
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            font-size: 0.7rem;
            position: relative;
        }

        .adsense-box-404::after {
            content: "SECURE ADVERTISING NODE";
            position: absolute;
            bottom: 8px;
            font-size: 0.5rem;
            opacity: 0.4;
        }
    </style>
</head>
<body class="text-white leading-relaxed antialiased min-h-screen flex items-center justify-center p-4 selection:bg-blue-600 selection:text-white">

    <div class="max-w-2xl w-full border border-white/10 bg-[#0d284b] shadow-2xl p-6 sm:p-14 relative overflow-hidden">
        <!-- Accent Glow background component -->
        <div class="absolute -top-32 -right-32 w-64 h-64 bg-blue-500 rounded-none blur-[120px] opacity-20 pointer-events-none"></div>
        <div class="absolute -bottom-32 -left-32 w-64 h-64 bg-purple-500 rounded-none blur-[120px] opacity-20 pointer-events-none"></div>

        <div class="relative z-10 flex flex-col items-center text-center">
            
            <!-- ANIMATED SIGNAL LOST ICON -->
            <div class="relative mb-8 flex justify-center items-center">
                <!-- Glowing Pulsing Ring -->
                <div class="absolute inset-0 rounded-full bg-red-500/10 animate-ping scale-150 duration-1000"></div>
                <div class="bg-red-950/40 border border-red-500/30 p-5 rounded-none ring-8 ring-red-500/5 flex items-center justify-center text-red-400">
                    <svg class="w-10 h-10 animate-pulse" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M18.364 5.636a9 9 0 010 12.728m0 0l-2.829-2.829m2.829 2.829L21 21M21 3L3 21M6.05 6.05a9 9 0 000 12.728M15.536 8.464a5 5 0 010 7.072m-3.536-3.536L12 12m-3.536-3.536a5 5 0 000 7.072" />
                    </svg>
                </div>
            </div>

            <div class="inline-flex items-center px-3 py-1 bg-red-500/10 text-red-400 text-[10px] font-black uppercase tracking-widest mb-6 border border-red-500/20 italic">
                <span class="w-1.5 h-1.5 bg-red-500 rounded-none mr-2 animate-pulse"></span>
                Tidak ditemukan!
            </div>

            <!-- THE SYSTEM ERROR HEADER -->
            <h1 class="text-3xl sm:text-5xl font-black tracking-tighter leading-none italic uppercase mb-8">
                <span class="text-red-500 not-italic">404</span>
            </h1>

            <!-- HIGH UTILITY EXPLANATORY BLOCK -->
            <div class="text-left bg-[#0c2340]/90 border border-white/5 p-6 sm:p-8 space-y-6 mb-8 w-full">
                <div>
                    <h2 class="text-[10px] sm:text-xs font-black uppercase tracking-[0.2em] text-blue-400 mb-1">Doa Agpeya Indonesia</h2>
                    <p class="text-slate-300 text-xs sm:text-sm font-semibold leading-relaxed">
                        Halaman yang anda cari tidak ditemukan. Silahkan kembali ke halaman utama.<br/><br/>Tuhan Yesus Kristus berkati!<br/>(Nova Daris)
                    </p>
                </div>
            </div>

            <!-- HIGH CONTRAST MANUAL CTA -->
            <div class="w-full flex flex-col sm:flex-row gap-3">
                <a href="." class="w-full inline-flex items-center justify-center bg-blue-600 hover:bg-blue-700 text-white font-black uppercase text-sm tracking-widest py-6 px-10 rounded-none transition-all shadow-md gap-3 ring-2 ring-blue-500/20 hover:scale-[1.01]">
                    <i data-lucide="map-pin" class="w-5 h-5 text-white"></i>
                    <span>Kembali ke Doa Agpeya</span>
                </a>
            </div>

        </div>
    </div>

    <!-- START INSTANT LUCIDE TRANSLATOR -->
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
